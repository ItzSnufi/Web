<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snufi Coding | Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="cursor-dot"></div><div class="cursor-outline"></div>

    <div class="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <nav class="sidebar" id="sidebar">
        <ul class="nav-links">
            <li><a href="index.html" data-key="navHome">Startseite</a></li>
            <li><a href="preise.html" data-key="navPrices">Preise</a></li>
            <li><a href="agb.html" data-key="navAgb">AGBs</a></li>
        </ul>
    </nav>

    <div class="lang-switch">
        <button onclick="setLanguage('de')" id="btn-de">DE</button>
        <button onclick="setLanguage('en')" id="btn-en">EN</button>
    </div>

    <div class="area"><ul class="circles"><li></li><li></li><li></li><li></li><li></li></ul></div>

    <div class="container">
        <header>
            <div class="logo">Snufi<span>Coding</span></div>
            <p class="subtitle" data-key="heroSubtitle">High-End Software Engineering</p>
        </header>

        <section class="glass-card">
            <h3 data-key="bioTitle">Über das Business</h3>
            <p data-key="bioP1">Maßgeschneiderte Software-Lösungen für anspruchsvolle Kunden.</p>
            <div class="skills-grid">
                <div class="skill-item"><i class="fab fa-java"></i> Java</div>
                <div class="skill-item"><i class="fab fa-python"></i> Python</div>
                <div class="skill-item"><i class="fas fa-hashtag"></i> C#</div>
            </div>
        </section>

        <section class="glass-card">
            <h2 data-key="formTitle">Projekt-Anforderungen</h2>
            <form action="https://formsubmit.co/developersnufi@gmail.com" method="POST" id="mainForm">
                <input type="text" name="name" placeholder="Name" required>
                <input type="email" name="email" placeholder="Email" required>
                <textarea name="message" placeholder="Anforderungen..." rows="6" required></textarea>
                <button type="submit" class="submit-btn" data-key="submitBtn">Anfrage senden</button>
            </form>
        </section>
    </div>

    <div id="thanks-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 data-key="modalTitle">Danke!</h2>
            <p data-key="modalText">Anfrage erhalten.</p>
            <button onclick="closeModal()" class="submit-btn">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
